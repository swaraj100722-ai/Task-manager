<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <title>Login | Team Task Manager</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            overflow: hidden;
            position: relative;
        }

        /* Animated background elements for 'Main Page' feel */
        body::before,
        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            z-index: -1;
            filter: blur(80px);
            opacity: 0.4;
        }

        body::before {
            background: var(--primary);
            top: -100px;
            left: -100px;
            animation: float 10s infinite alternate;
        }

        body::after {
            background: var(--secondary);
            bottom: -100px;
            right: -100px;
            animation: float 12s infinite alternate-reverse;
        }

        @keyframes float {
            from {
                transform: translate(0, 0);
            }

            to {
                transform: translate(50px, 50px);
            }
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 3rem;
            animation: cardEnter 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes cardEnter {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(30px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .login-header i {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 1rem;
            display: inline-block;
        }

        .login-header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .password-container {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-muted);
            transition: color 0.2s;
        }

        .password-toggle:hover {
            color: var(--primary);
        }

        .forgot-link {
            display: block;
            text-align: right;
            font-size: 0.75rem;
            color: var(--primary);
            text-decoration: none;
            margin-top: 8px;
            font-weight: 600;
            transition: 0.2s;
        }

        .forgot-link:hover {
            text-decoration: underline;
            opacity: 0.8;
        }

        .login-btn {
            width: 100%;
            margin-top: 2rem;
            padding: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.4);
        }

        .social-login {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: center;
            gap: 1.5rem;
        }

        .social-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            border: 1px solid var(--border);
            color: var(--text-main);
            cursor: pointer;
            transition: 0.2s;
        }

        .social-icon:hover {
            border-color: var(--primary);
            color: var(--primary);
            transform: scale(1.1);
        }

        /* Premium Separator & Guide Button */
        .separator {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
            gap: 15px;
        }

        .separator-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--text-muted), transparent);
        }

        .separator-dot {
            width: 6px;
            height: 6px;
            background: var(--text-muted);
            border-radius: 50%;
        }

        .guide-btn {
            width: fit-content;
            margin: 0 auto;
            background: var(--bg-sidebar) !important;
            border: 1px solid var(--border) !important;
            color: var(--text-muted) !important;
            font-size: 0.75rem !important;
            padding: 6px 14px !important;
            text-decoration: none !important;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .guide-btn:hover {
            border-color: var(--primary) !important;
            color: var(--primary) !important;
            background: rgba(99, 102, 241, 0.05) !important;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        .guide-btn i {
            transition: transform 0.3s;
        }

        .guide-btn:hover i {
            transform: scale(1.2) rotate(-5deg);
        }
    </style>
</head>

<body data-theme="light">
    <div class="login-card glass">
        <div class="login-header">
            <i class="fas fa-shield-alt"></i>
            <h1>Log in.</h1>
            <p>Log in to access your dashboard</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" id="email" class="form-input" placeholder="name@gmail.com" required>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="password-container">
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                    <i class="fas fa-eye password-toggle" id="togglePassword"></i>
                </div>
                <a href="#" class="forgot-link" id="forgotPasswordBtn">Forgot password?</a>
            </div>

            <button type="submit" class="btn btn-primary login-btn">
                Log In <i class="fas fa-arrow-right"></i>
            </button>
            <div class="separator">
                <div class="separator-line"></div>
                <div class="separator-dot"></div>   
                <div class="separator-line"></div>
            </div>
            
            <a href="https://drive.google.com/file/d/1yvljXGmW9uDONlarMDSvBm_Puo_neNzY/view?usp=sharing"
               target="_blank" class="btn guide-btn">
                <i class="fas fa-book-reader"></i> User Guide
            </a>
        </form>

    </div>

    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/notifications.js"></script>
    <script>
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            togglePassword.classList.toggle('fa-eye');
            togglePassword.classList.toggle('fa-eye-slash');
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const btn = e.target.querySelector('button');
            API.setButtonLoading(btn, true);

            const success = await Auth.login(email, password);
            if (success) {
                const user = Auth.getUser();
                // Success Modal matching main page style
                const modal = document.createElement('div');
                modal.className = 'modal-overlay';
                modal.style.display = 'flex';
                modal.style.zIndex = '3000';
                modal.innerHTML = `
                    <div class="glass animate-fade" style="padding: 3rem; width: 420px; text-align: center; border-top: 5px solid var(--success);">
                        <div style="width: 80px; height: 80px; background: var(--success); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; margin: 0 auto 1.5rem;">
                            <i class="fas fa-check"></i>
                        </div>
                        <h2 style="font-size: 1.8rem; margin-bottom: 0.5rem; color: var(--text-main);">Verified!</h2>
                        <p style="color: var(--text-muted); margin-bottom: 2rem;">Welcome back, <b>${user.name}</b></p>
                        <div class="loader-line" style="width: 100%; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden;">
                            <div style="width: 100%; height: 100%; background: var(--success); animation: loadProgress 0.8s ease-in-out;"></div>
                        </div>
                    </div>
                `;
                document.body.appendChild(modal);

                setTimeout(() => {
                    window.location.href = 'landing.html';
                }, 800);
            } else {
                API.setButtonLoading(btn, false);
                Notification.show('Invalid email or password.', 'error');
            }
        });

        document.getElementById('forgotPasswordBtn').addEventListener('click', (e) => {
            e.preventDefault();
            Notification.show('Contact your admin to reset your password', 'info');
        });

        // Add CSS for the loader
        const style = document.createElement('style');
        style.textContent = `
            @keyframes loadProgress {
                0% { transform: translateX(-100%); }
                100% { transform: translateX(0); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>

</html>
