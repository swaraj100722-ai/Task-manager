<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submission Review | TaskMaster</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .review-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .submission-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border);
        }

        .report-section {
            background: #f8fafc;
            padding: 30px;
            border-radius: 15px;
            border: 1px solid var(--border);
            margin: 30px 0;
            line-height: 1.8;
            color: var(--text-main);
            font-size: 1.1rem;
        }

        .resource-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }

        .resource-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            text-decoration: none;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .resource-card:hover {
            transform: translateY(-3px);
            border-color: var(--primary);
            box-shadow: 0 10px 20px rgba(var(--primary-rgb), 0.1);
        }

        .image-gallery {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .gallery-img {
            width: 100%;
            border-radius: 15px;
            border: 1px solid var(--border);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            transition: 0.3s;
        }

        .gallery-img:hover {
            transform: scale(1.01);
        }

        .rating-panel {
            position: sticky;
            bottom: 30px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px 40px;
            border-radius: 50px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            border: 1px solid var(--border);
            margin-top: 50px;
            width: fit-content;
            left: 50%;
            transform: translateX(-50%);
        }

        .star-btn {
            font-size: 2rem;
            color: #cbd5e1;
            cursor: pointer;
            transition: 0.2s;
        }

        .star-btn:hover {
            transform: scale(1.2);
        }
    </style>
</head>

<body data-theme="light">
    <div class="review-container">
        <header class="review-header">
            <div>
                <a href="tasks.html" style="text-decoration: none; color: var(--text-muted); font-size: 0.9rem; display: flex; align-items: center; gap: 8px;">
                    <i class="fas fa-arrow-left"></i> Back to Tasks
                </a>
                <h1 style="margin-top: 15px;" id="taskTitle">Loading Submission...</h1>
                <p style="color: var(--text-muted); margin-top: 5px;" id="taskMeta"></p>
            </div>
        </header>

        <main class="submission-card">
            <h3 style="color: var(--primary);"><i class="fas fa-comment-alt"></i> Completion Report</h3>
            <div id="reportContent" class="report-section">
                <!-- Member's report will be here -->
            </div>

            <h3 style="color: var(--primary); margin-top: 40px;"><i class="fas fa-link"></i> Resource Links</h3>
            <div id="resourceGrid" class="resource-grid">
                <!-- Links will be here -->
            </div>

            <h3 style="color: var(--primary); margin-top: 40px; margin-bottom: 20px;"><i class="fas fa-images"></i> Design Preview</h3>
            <div id="imageGallery" class="image-gallery">
                <!-- Images will be here -->
            </div>
        </main>

        <div class="rating-panel">
            <span style="font-weight: 700; color: var(--text-muted);">RATE SUBMISSION:</span>
            <div id="adminStars" style="display: flex; gap: 15px;">
                <i class="fas fa-star star-btn" onclick="rateTask(1)"></i>
                <i class="fas fa-star star-btn" onclick="rateTask(2)"></i>
                <i class="fas fa-star star-btn" onclick="rateTask(3)"></i>
                <i class="fas fa-star star-btn" onclick="rateTask(4)"></i>
                <i class="fas fa-star star-btn" onclick="rateTask(5)"></i>
            </div>
            <p id="ratingStatus" style="position: absolute; top: -30px; font-size: 0.8rem; color: var(--success); display: none; font-weight: 700;">Rating Saved!</p>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/notifications.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const taskId = urlParams.get('id');

        async function init() {
            if (!taskId) {
                window.location.href = 'tasks.html';
                return;
            }

            const task = await API.request(`/tasks/${taskId}/`);
            if (!task) {
                Notification.show('Task not found', 'error');
                return;
            }

            // Populate Header
            document.getElementById('taskTitle').textContent = task.title;
            document.getElementById('taskMeta').innerHTML = `
                Assigned to: <b>${task.assigned_to_detail.name}</b> | 
                Project: <b>${task.project_detail.name}</b> | 
                Submitted: <b>${new Date(task.submission_date).toLocaleString()}</b>
            `;

            // Populate Report
            document.getElementById('reportContent').textContent = task.submission_reports || 'No written report provided.';

            // Populate Resources
            const grid = document.getElementById('resourceGrid');
            if (task.submission_code) {
                grid.innerHTML += `
                    <a href="${task.submission_code}" target="_blank" class="resource-card">
                        <div style="background: #eff6ff; color: #3b82f6; width: 50px; height: 50px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;">
                            <i class="fab fa-github"></i>
                        </div>
                        <div>
                            <span style="display: block; font-weight: 700; color: var(--text-main);">Source Code</span>
                            <span style="font-size: 0.8rem; color: var(--text-muted);">View GitHub Repository</span>
                        </div>
                    </a>
                `;
            }
            if (task.submission_docs) {
                grid.innerHTML += `
                    <a href="${task.submission_docs}" target="_blank" class="resource-card">
                        <div style="background: #fef2f2; color: #ef4444; width: 50px; height: 50px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;">
                            <i class="fas fa-file-pdf"></i>
                        </div>
                        <div>
                            <span style="display: block; font-weight: 700; color: var(--text-main);">Documentation</span>
                            <span style="font-size: 0.8rem; color: var(--text-muted);">View PDF/Docs</span>
                        </div>
                    </a>
                `;
            }

            // Populate Gallery
            const gallery = document.getElementById('imageGallery');
            if (task.images && task.images.length > 0) {
                task.images.forEach(img => {
                    const fullUrl = getFullImageUrl(img.image);
                    gallery.innerHTML += `<img src="${fullUrl}" class="gallery-img" onclick="window.open('${fullUrl}')">`;
                });
            } else {
                gallery.innerHTML = '<p style="color: var(--text-muted);">No design screenshots uploaded.</p>';
            }

            updateStars(task.rating);
        }

        function getFullImageUrl(path) {
            if (!path) return '';
            if (path.startsWith('http')) return path;
            
            // Dynamically get the backend origin from API_BASE
            try {
                const apiOrigin = new URL(API_BASE).origin;
                return apiOrigin + (path.startsWith('/') ? '' : '/') + path;
            } catch (e) {
                // Fallback to local default if API_BASE is malformed
                return 'http://127.0.0.1:8000' + (path.startsWith('/') ? '' : '/') + path;
            }
        }

        async function rateTask(rating) {
            const success = await API.request(`/tasks/${taskId}/rate/`, 'POST', { rating });
            if (success) {
                updateStars(rating);
                const status = document.getElementById('ratingStatus');
                status.style.display = 'block';
                setTimeout(() => status.style.display = 'none', 2000);
            }
        }

        function updateStars(rating) {
            const stars = document.querySelectorAll('.star-btn');
            stars.forEach((s, i) => {
                s.style.color = (i < rating) ? '#f59e0b' : '#cbd5e1';
            });
        }

        init();
    </script>
</body>

</html>
